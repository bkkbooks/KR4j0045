body:
  text: 蒲江詞宋盧祖臯撰賀新郎彭傳師於吳江三髙堂之前作釣雪亭蓋擅漁人之窟宅以供詩境也趙子野約余賦之傳師中興詞選作傳帥挽住風前柳問鴟夷當日扁舟近曾來否月落潮生無限事零落茶煙未久謾留得蓴鱸依舊可是功名從來誤撫荒詞誰繼風流後今古恨一搔首江涵雁影梅花瘦四無塵雪飛雲起夜窗如晝萬里乾坤清絶處付與漁翁釣叟又恰是題詩時候猛拍闌干呼鷗鷺道他年我亦垂綸手飛過我共樽酒雲起一作風起又姑蘇臺觀雪十頃涵空碧畫圖中崢嶸勾玉亂零吹璧倚遍危欄吟不盡把酒風前岸幘記當日西湖為客誰剪吳松江上水笑乾坤奇事成兒劇還照我夜窗白崇臺目斷清無極引笻枝瓊瑶步軟印登臨屐娃館娉婷知何在淚粉愁濃恨積故化作飛花狼藉舊事悠悠渾莫問有玉蟾醉裏曾相識聊伴我吹羌笛勾玉一作幻玉吹羌笛一作夜吹笛或病二尾句相似應作吹羌笛宴清都初春春訊飛瓊管風日薄度墻啼鳥聲亂江城次第笙歌翠合綺羅香暖溶溶澗緑氷泮醉夢裏年華暗換料黛眉重鎖隋堤芳心還動梁苑新來雁闊雲音鸞分鑑影無計重見啼春細雨籠愁淡月恁時庭院離腸未語先斷算猶有憑高望眼更那堪芳草連天飛梅㺯晚魚遊春水離愁離愁禁不去好夢别來無覓處風翻征袖觸目年芳如許軟紅塵裏鳴鞭鐙拾翠叢中勾伴侣都負嵗時暗關情緒昨夜山陰杜宇似把歸期驚倦旅遙知樓倚東風凝顰暗數寶香拂拂遺鴛錦心事悠悠尋燕語芳草暮寒亂花微雨征袖花庵集作征袂倦尋芳春思香泥壘燕密葉巢鶯春晴寒淺花徑風柔著地舞裀紅軟鬬草煙欺羅袂薄秋千影落春遊倦醉歸來記寶帳歌慵錦屛香暖别來悵光陰容易還又荼䕷牡丹開遍妒恨疏狂那更柳花迎面鴻羽難慿芳信短長安猶近歸期逺荷危樓但鎮日繡簾高捲西江月中春燕掠晴絲裊裊魚吹水葉粼粼禁街微雨灑芳塵寒食清明相近謾著宫羅試暖間呼社酒酬春晚風簾幕悄無人二十四畨花信清平樂春恨柳邊深院燕語明如剪消息無慿聽又懶隔斷畫屛雙扇寶杯金縷紅牙醉魂幾度兒家何處一春遊蕩夢中猶恨楊花烏夜啼離恨柳色津頭泫緑桃花渡口啼紅一春又負西湖醉離恨雨聲中客袂迢迢西塞餘寒剪剪東風誰家拂水飛來燕惆悵小樓空又西湖漾暖紋波颭颭吹晴絲雨濛濛輕衫短帽西湖路花氣撲春驄鬬草褰衣濕翠秋千瞥眼飛紅日長不放春醪困立盡海棠風又秋别段段寒沙淺水蕭蕭暮雨孤篷香羅不共征衫逺砧杵客愁中别恨慵著楊柳歸期暗數芙蓉碧梧聲到紗窗曉昨夜已秋風謁金門惜别蘭棹舉相趂落紅飛去一隙輕簾凝睇處柳絲牽不住昨日翠蛾金縷今夜碧波煙渚好夢無慿窗又雨天街知幾許天街一作天涯又春思間院宇獨自行來行去花片無聲簾外雨峭寒生碧樹做㺯清明時序料理春酲情緒憶得歸時停棹處畫橋看落絮水龍吟荼䕷蕩紅流水無聲暮煙細草粘天逺低回倦蝶往來忙燕芳期頓懶緑霧迷墻翠虬騰架雪明香暖笑依依欲挽春風教住還疑是相逢晚不似梅粧瘦減占人間丰神蕭散攀條㺯蘂天涯猶記曲闌小院老去情懷酒邊風味有時重見對枕幃空想東窗舊夢帶酒離恨又淮西重午會昌湖上扁舟幾年不醉西山路流光又是宫衣初試安榴半吐千里江山滿川煙草薰風淮楚念離騷恨逺獨醒人去闌干外誰懷古亦有魚龍戲舞豔晴川綺羅歌鼓鄉情節意樽前同是天涯羇旅漲緑池塘翠陰庭院歸期無據問明年此夜一眉新月照人何處洞仙歌茉莉玉肌翠袖較似荼䕷瘦幾度熏醒夜窗酒問炎州何事得許清涼塵不到一段氷壺剪就晚來庭戶悄暗數流光細拾芳英黯回首念日暮江東偏為魂銷人易老幽韻清標似舊正簟紋如水帳如煙更奈向月明露濃時候鷓鴣天春懷纎指輕拈小砑紅自調宫羽按歌童寒餘芍藥欄邊雨香落荼䕷架底風間意態小房櫳丁寧須滿玉西東一春醉得鶯花老不似年時怨玉容又庭緑初圜結蔭濃香溝收拾樹梢紅池塘少歇鳴蛙雨簾幕輕回舞燕風春又老笑誰同淡煙斜日小樓東相思一曲臨風笛吹過雲山第幾重摸魚兒九日登姑蘇臺怪西風曉來欹帽年華還是重九天機衮衮山新瘦客子情懷誰剖微雨後更雁帶邊寒裊裊欺羅袖慵荷倦柳誚不似黃花田田照眼風味儘如舊登臨地寂寞崇臺最久闌干幾度搔首翻雲覆雨無窮事流水斜陽知否吟未就但衰草寒煙商略愁時候間愁浪有總輸與淵明東籬醉舞身世付杯酒夜飛鵲漫别意驕嘶破清曉分恨臨期花下恁月明知餘光是處散離思最憐香靄霏霏牽衣揾彈淚問凄風愁露剗地東西留鞭換佩怕匆匆巳是遲遲涼怯幾番羅袂還燕别文梁螢點書幃一自秋娘迢遞黃金對酒爭忍輕揮新來院落雁難尋簾幕長垂怕雕梧敲徑驚回舊夢應也顰眉漁家傲夀白石先生白石山中風景異先生日日懷歸計何事黃岡飛雪地偏著意畫堂却為東坡起人説前身坡老是文章氣節渾相似只待鼎彝勳業遂梅花外歸來長向山中醉木蘭花慢别西湖兩詩僧嫩寒催客棹載酒去載詩歸正紅葉漫山清泉潄石多少心期三生溪橋話别悵薜蘿猶惹翠雲衣不似今畨醉夢帝城幾度斜暉鴻飛煙水瀰瀰回首處只君知念吳江鷺憶孤山鶴怨依舊東西高峰夢醒雲起是瘦吟窗底憶君時何日還尋後約為余先寄梅枝沁園春雙溪狎鷗幾葉凋楓半篙寒日傍橋繫船愛洞門深鎖人間福地雙溪分占天上星躔破帽衝寒短鞭敲月此地經行知幾年空􅑿得似沈郎消瘦還欠詩篇沙鷗伴我愁眠向水驛風亭紅蓼邊有村醪可飲且須同醉溪魚堪鱠切莫論錢笠澤波頭垂虹亭上橙蟹肥時霜滿天相隨否算江南江北惟有君間菩薩鬘春思翠樓十二闌干曲雨痕新染蒲萄緑時節又黃昏東風深閉門玉簫吹未徹窗影梅花月無語只低眉間拈雙荔枝滿江紅齊雲月酌樓倚晴空炎雲淨晚來風力滄海外等間吹上滿輪寒璧河漢低垂天欲近乾坤浩蕩秋無極憑欄干衣袂拂青冥知何夕登眺地追疇昔吳越事皆陳迹對清光祗有醉吟消得萬古悠悠惟月在浮生衮衮空頭白自騎鯨仙去有誰知遙相憶好事近秋飲雁外雨絲絲將恨和愁都織玉骨西風添瘦減尊前歌力袖香曾枕醉紅腮依約唾䀶碧花下凌波入夢引春雛雙鶒蒲江詞
